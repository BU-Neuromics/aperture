id: org.datahelix.aperture.control-plane
name: aperture_control_plane
version: 1.0.0
description: >-
  The Aperture control-plane document type: a Mosaic entity type for storing
  Aperture's own state (saved views, workflow drafts, config-as-data) as
  {kind, name, payload} documents, recognized structurally by the SPA
  (ADR-0032). Ships as a recipe so any Mosaic deployment can opt in without
  Aperture code changes; see aperture#17.
