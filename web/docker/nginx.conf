server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the runtime config or the HTML shell; hashed assets are
    # immutable.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: client-side state lives in query params.
    location / {
        try_files $uri /index.html;
    }
}
