name: Release

# Release pipeline (DataHelix 1.0 epic P1.4, issue #22).
#
# Pushing a `vX.Y.Z` tag — or dispatching this workflow with that tag name,
# which creates the tag at the dispatched ref — builds the SPA image and
# publishes it digest-addressed at ghcr.io/bu-neuromics/aperture, attaching an
# `image-digest.json` release asset for the DataHelix certification workflow /
# composition.lock.json bump bot. Endpoint config is injected at container
# start (web/docker/40-aperture-config.sh), so one image serves any
# deployment.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z; must match web/package.json). Created at the dispatched ref if it doesn't exist."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches web/package.json version
        id: version
        run: |
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(node -p "require('./web/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_NAME does not match web/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

  image:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/bu-neuromics/aperture
          # Explicit version (not type=semver) so workflow_dispatch runs, which
          # aren't on a tag ref, tag the image identically.
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            REVISION=${{ github.sha }}

  release:
    needs: [validate, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write image-digest.json
        run: |
          python3 - <<'EOF'
          import json
          version = "${{ needs.validate.outputs.version }}"
          digest = "${{ needs.image.outputs.digest }}"
          image = "ghcr.io/bu-neuromics/aperture"
          json.dump(
              {
                  "component": "aperture",
                  "repo": "BU-Neuromics/aperture",
                  "version": version,
                  "image": image,
                  "digest": digest,
                  "ref": f"{image}@{digest}",
              },
              open("image-digest.json", "w"),
              indent=2,
          )
          EOF
          cat image-digest.json

      - uses: softprops/action-gh-release@v2
        with:
          # On workflow_dispatch the tag doesn't exist yet — this creates it
          # at the checked-out ref.
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: image-digest.json
